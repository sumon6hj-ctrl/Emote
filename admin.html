<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWAXPRIME - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">
    
    <div id="adminLoginView" class="login-body">
        <div class="login-container">
            <div class="login-box">
                <div class="brand-section">
                    <div class="lightning-icon">🔐</div>
                    <h1 class="brand-name">ADMIN PANEL</h1>
                    <p class="brand-tagline">JWAXPRIMEControl Center</p>
                </div>

                <form id="adminLoginForm" class="login-form">
                    <div class="input-container">
                        <input type="email" id="adminEmail" value="sabujhawlader31@gmail.com" placeholder="Admin Email" required class="login-input" autocomplete="email">
                    </div>
                    <div class="input-container">
                        <input type="password" id="adminPassword" placeholder="Admin Password" required class="login-input" autocomplete="current-password">
                    </div>
                    <button type="submit" class="login-btn">
                        <span>Access Admin Panel</span>
                    </button>
                    <div id="adminLoginError" class="error-message hidden"></div>
                </form>
            </div>
        </div>
    </div>

    <div id="adminDashboard" class="dashboard-container hidden">
        <header class="dashboard-header">
            <div class="header-brand">
                <div class="lightning-icon" style="font-size: 28px;">⚡</div>
                <h1>ADMIN PANEL</h1>
            </div>
            <button id="adminLogout" class="icon-button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke-width="2"/>
                </svg>
            </button>
        </header>

        <section class="panel-section">
            <div class="section-title">
                <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="2" y="2" width="20" height="8" rx="2" ry="2" stroke-width="2"/>
                    <rect x="2" y="14" width="20" height="8" rx="2" ry="2" stroke-width="2"/>
                </svg>
                <h2>SERVER MANAGEMENT</h2>
            </div>

            <form id="serverForm" class="admin-form">
                <input type="hidden" id="editServerId">
                <div class="form-grid">
                    <input type="text" id="serverName" placeholder="Server Name (e.g., India Server 1)" required class="config-input">
                    <input type="url" id="serverUrl" placeholder="https://example.com" required class="config-input">
                </div>
                <div class="form-grid">
                    <select id="serverRegion" required class="config-input">
                        <option value="">Select Region</option>
                        <option value="indian">🇮🇳 Indian Servers</option>
                        <option value="bangladesh">🇧🇩 Bangladesh Servers</option>
                        <option value="other">🌍 Other Servers</option>
                    </select>
                    <input type="number" id="serverOrder" placeholder="Order (1, 2, 3...)" class="config-input" min="1">
                </div>
                <button type="submit" class="action-btn-large">
                    <span id="serverBtnText">ADD SERVER</span>
                </button>
                <button type="button" id="cancelServerEdit" class="squad-btn leave hidden">CANCEL</button>
            </form>

            <div id="serverList" class="admin-list"></div>
        </section>

        <section class="panel-section">
            <div class="section-title">
                <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="12" cy="12" r="10" stroke-width="2"/>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01" stroke-width="2"/>
                </svg>
                <h2>EMOTE MANAGEMENT</h2>
            </div>

            <form id="emoteForm" class="admin-form">
                <input type="hidden" id="editEmoteId">
                <div class="form-grid">
                    <input type="url" id="emoteImageUrl" placeholder="Image URL" required class="config-input">
                    <select id="emoteCategory" required class="config-input">
                        <option value="">Select Category</option>
                    </select>
                </div>
                <div id="emotePreview" class="emote-preview-container"></div>
                <button type="submit" class="action-btn-large">
                    <span id="emoteBtnText">ADD EMOTE</span>
                </button>
                <button type="button" id="cancelEmoteEdit" class="squad-btn leave hidden">CANCEL</button>
            </form>

            <div id="emoteList" class="admin-list"></div>
        </section>

        <section class="panel-section">
            <div class="section-title">
                <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M4 6h16M4 12h16M4 18h16" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <h2>CATEGORY MANAGEMENT</h2>
            </div>

            <form id="categoryForm" class="admin-form">
                <input type="hidden" id="editCategoryId">
                <div class="form-grid">
                    <input type="text" id="categoryName" placeholder="Category Name (e.g., HOT)" required class="config-input">
                    <input type="text" id="categoryIcon" placeholder="Icon (e.g., 🔥)" class="config-input">
                </div>
                <input type="number" id="categoryOrder" placeholder="Order (1, 2, 3...)" class="config-input" min="1">
                <button type="submit" class="action-btn-large">
                    <span id="categoryBtnText">ADD CATEGORY</span>
                </button>
                <button type="button" id="cancelCategoryEdit" class="squad-btn leave hidden">CANCEL</button>
            </form>

            <div id="categoryList" class="admin-list"></div>
        </section>

        <section class="panel-section">
            <div class="section-title">
                <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" stroke-width="2"/>
                </svg>
                <h2>FOOTER LINKS</h2>
            </div>

            <form id="linksForm" class="admin-form">
                <input type="url" id="telegramUrl" placeholder="Telegram URL" required class="config-input">
                <input type="url" id="githubUrl" placeholder="GitHub URL" required class="config-input">
                <input type="url" id="discordUrl" placeholder="Discord URL" required class="config-input">
                <input type="url" id="youtubeUrl" placeholder="YouTube URL" required class="config-input">
                <button type="submit" class="action-btn-large">
                    <span>UPDATE LINKS</span>
                </button>
            </form>
        </section>

        <section class="panel-section">
            <div class="section-title">
                <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z" stroke-width="2"/>
                </svg>
                <h2>MAINTENANCE MODE</h2>
            </div>

            <form id="maintenanceForm" class="admin-form">
                <div class="toggle-container">
                    <label class="toggle-switch">
                        <input type="checkbox" id="maintenanceToggle">
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="toggle-label">Enable Maintenance Mode</span>
                </div>
                <textarea id="maintenanceMessage" placeholder="Maintenance message for users..." rows="3" class="config-input"></textarea>
                <button type="submit" class="action-btn-large">
                    <span>SAVE SETTINGS</span>
                </button>
            </form>
        </section>

        <section class="panel-section">
            <div class="section-title">
                <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke-width="2"/>
                    <path d="M7 11V7a5 5 0 0110 0v4" stroke-width="2"/>
                </svg>
                <h2>LOGIN PASSWORD</h2>
            </div>

            <form id="passwordForm" class="admin-form">
                <input type="password" id="newPassword" placeholder="New Login Password" required class="config-input">
                <button type="submit" class="action-btn-large">
                    <span>UPDATE PASSWORD</span>
                </button>
            </form>
        </section>
    </div>

    <div id="adminLoader" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>Processing...</p>
    </div>

    <script type="module" src="js/admin.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Aapka SmartLink
            const mySmartLink = "https://www.effectivegatecpm.com/vx0p99im2r?key=c82002ec3b96b3c86b126267c75902b3";
            const openAd = () => window.open(mySmartLink, '_blank');

            // --- 1. LOGIN PAGE LOGIC ---
            
            // Email Input Click -> Ad (Once)
            const adminEmailInput = document.getElementById('adminEmail');
            if (adminEmailInput) {
                adminEmailInput.addEventListener('click', () => {
                    if (!sessionStorage.getItem('ad_admin_email')) {
                        openAd();
                        sessionStorage.setItem('ad_admin_email', 'true');
                    }
                });
            }

            // Password Input Click -> Ad (Once)
            const adminPassInput = document.getElementById('adminPassword');
            if (adminPassInput) {
                adminPassInput.addEventListener('click', () => {
                    if (!sessionStorage.getItem('ad_admin_pass')) {
                        openAd();
                        sessionStorage.setItem('ad_admin_pass', 'true');
                    }
                });
            }
            // Login Button (No Ad, as requested - no code added for it)


            // --- 2. ADD EMOTE LOGIC ---

            // Emote URL Input -> Ad (Once)
            const emoteUrlInput = document.getElementById('emoteImageUrl');
            if (emoteUrlInput) {
                emoteUrlInput.addEventListener('click', () => {
                    if (!sessionStorage.getItem('ad_emote_url')) {
                        openAd();
                        sessionStorage.setItem('ad_emote_url', 'true');
                    }
                });
            }

            // Emote Category Select -> Ad (Once)
            const emoteCatInput = document.getElementById('emoteCategory');
            if (emoteCatInput) {
                emoteCatInput.addEventListener('click', () => {
                    if (!sessionStorage.getItem('ad_emote_cat')) {
                        openAd();
                        sessionStorage.setItem('ad_emote_cat', 'true');
                    }
                });
            }

            // Emote Button Cycle (1:Ad, 2:Ok, 3:Ok, 4:Ad...)
            const emoteForm = document.getElementById('emoteForm');
            let emoteClickCounter = 1; // Counter Start

            if (emoteForm) {
                // We attach to capture phase to intercept submit
                const emoteBtn = emoteForm.querySelector('button[type="submit"]');
                if(emoteBtn) {
                    emoteBtn.addEventListener('click', function(e) {
                        // Logic: 1st click (Ad), 2nd (Ok), 3rd (Ok), 4th (Ad)
                        // Formula: remainder of 1 is Ad.
                        if (emoteClickCounter % 3 === 1) {
                            e.preventDefault(); // Stop Adding Emote
                            e.stopImmediatePropagation(); // Stop other scripts
                            openAd(); // Open Ad
                        }
                        // Else: Let it work normally
                        emoteClickCounter++;
                    }, true);
                }
            }


            // --- 3. PASSWORD UPDATE LOGIC ---

            // New Password Input -> Ad (Once)
            const newPassInput = document.getElementById('newPassword');
            if (newPassInput) {
                newPassInput.addEventListener('click', () => {
                    if (!sessionStorage.getItem('ad_new_pass')) {
                        openAd();
                        sessionStorage.setItem('ad_new_pass', 'true');
                    }
                });
            }

            // Update Password Button (1:Ad, 2:Ad, 3:Success)
            const passwordForm = document.getElementById('passwordForm');
            let passClickCounter = 1;

            if (passwordForm) {
                const passBtn = passwordForm.querySelector('button[type="submit"]');
                if(passBtn) {
                    passBtn.addEventListener('click', function(e) {
                        // Click 1: Ad
                        // Click 2: Ad
                        // Click 3: Success
                        if (passClickCounter === 1 || passClickCounter === 2) {
                            e.preventDefault(); // Stop Update
                            e.stopImmediatePropagation();
                            openAd(); // Open Ad
                        }
                        
                        // Click 3 hone par loop reset karein taaki agli bar fir ads aaye?
                        // Ya sirf ek bar ka cycle? Users usually want reset.
                        if (passClickCounter >= 3) {
                            passClickCounter = 0; // Reset logic for future
                        }
                        
                        passClickCounter++;
                    }, true);
                }
            }
        });
    </script>
</body>
</html>
